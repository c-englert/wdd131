<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página sobre Alegrete, cidade do Rio Grande do Sul, Brasil.">
    <meta name="author" content="Claudio Englert">
    <title>Alegrete | Rio Grande do Sul</title>
    <link rel="stylesheet" href="estilos/local.css">
    <script src="scripts/local.js" defer></script>
</head>

<body>
    <main>
        <!-- Imagem principal responsiva (srcset / picture) -->
        <picture class="hero">
            <source srcset="imagens/alegrete-largo.webp" media="(min-width: 700px)">
            <img src="imagens/alegrete-pequeno.webp" alt="Vista da cidade de Alegrete, RS" width="400" height="250">
        </picture>

        <div class="conteudo">
            <!-- Seção de dados -->
            <section class="dados">
                <h2>Dados</h2>
                <ul>
                    <li><span>Estado:</span> Rio Grande do Sul</li>
                    <li><span>País:</span> Brasil</li>
                    <li><span>População:</span> ~84.000</li>
                    <li><span>Fundação:</span> 1831</li>
                    <li><span>Área:</span> 7.803 km²</li>
                    <li><span>Rio principal:</span> Ibirapuitã</li>
                </ul>
            </section>

            <!-- Seção de clima -->
            <section class="clima">
                <h2>Clima</h2>
                <!-- Ícone SVG (só mobile, controlado via CSS) -->
                <img class="icone-clima" src="imagens/clima.svg" alt="Parcialmente nublado" width="60" height="60">
                <p class="temperatura">36&deg;C</p>
                <p>Parcialmente nublado</p>
                <p>Umidade: 40%</p>
                <p>Vento: 8 km/h</p>
                <p>Sensação Térmica: <span id="sensacao">N/A</span></p>
            </section>
        </div>
    </main>
    <footer>
        <p>&copy; <span id="ano"></span> Claudio Englert | Alegrete, RS</p>
        <p id="ultima-modificacao"></p>
    </footer>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Álbum de fotos de templos ao redor do mundo, incluindo Brasil, México, Itália e Estados Unidos.">
    <meta name="author" content="Claudio Englert">
    <title>Álbum do Templo</title>
    <link rel="stylesheet" href="estilos/templos.css">
    <link rel="stylesheet" href="estilos/templos-grande.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Roboto:wght@400;700&display=swap">
    <script src="scripts/templos.js" defer></script>
</head>

<body>
    <header>
        <p>Álbum do Templo</p>
        <button id="menu-hamburguer" aria-label="Abrir menu">&#9776;</button>
        <nav>
            <ul id="menu-lista" class="esconder">
                <li><a href="#">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Página Inicial</h1>

        <figure>
            <img src="imagens/templo_brasilia.webp" alt="Templo de Brasília, Brasil" loading="lazy" width="600"
                height="450">
            <figcaption>Brasília, Brasil</figcaption>
        </figure>

        <figure>
            <img src="imagens/templo_campinas.webp" alt="Templo de Campinas, Brasil" loading="lazy" width="600"
                height="450">
            <figcaption>Campinas, Brasil</figcaption>
        </figure>

        <figure>
            <img src="imagens/templo_curitiba.webp" alt="Templo de Curitiba, Brasil" loading="lazy" width="600"
                height="450">
            <figcaption>Curitiba, Brasil</figcaption>
        </figure>

        <figure>
            <img src="imagens/templo_portoalegre.webp" alt="Templo de Porto Alegre, Brasil" loading="lazy" width="600"
                height="450">
            <figcaption>Porto Alegre, Brasil</figcaption>
        </figure>

        <figure>
            <img src="imagens/templo_mexico.webp" alt="Templo da Cidade do México, México" loading="lazy" width="600"
                height="450">
            <figcaption>Cidade do México, México</figcaption>
        </figure>

        <figure>
            <img src="imagens/templo_puebla.webp" alt="Templo de Puebla, México" loading="lazy" width="600"
                height="450">
            <figcaption>Puebla, México</figcaption>
        </figure>

        <figure>
            <img src="imagens/templo_roma.webp" alt="Templo de Roma, Itália" loading="lazy" width="600" height="450">
            <figcaption>Roma, Itália</figcaption>
        </figure>

        <figure>
            <img src="imagens/templo_saltlake.webp" alt="Templo de Salt Lake City, Estados Unidos" loading="lazy"
                width="600" height="450">
            <figcaption>Salt Lake City, EUA</figcaption>
        </figure>

        <figure>
            <img src="imagens/templo_washington.webp" alt="Templo de Washington D.C., Estados Unidos" loading="lazy"
                width="600" height="450">
            <figcaption>Washington D.C., EUA</figcaption>
        </figure>
    </main>
    <footer>
        <p>&copy; <span id="anoatual"></span> Claudio Englert, Brasil</p>
        <p>Última modificação: <span id="ultimaModificacao"></span></p>
    </footer>
</body>

</html>
